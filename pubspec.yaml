name: cashfit
description: "Train and get paid."
publish_to: 'none'

version: 1.0.0+1
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # <- your image path
environment:
  sdk: ^3.7.2
video_player: ^2.9.3
dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  # Cupertino Icons for iOS-like icons
  cupertino_icons: ^1.0.8
  video_player: ^2.9.3
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  path_provider: ^2.0.11
  flutter_image_compress: ^2.4.0
  http: ^1.3.0
  uuid: ^4.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/images/
    - assets/videos/
  uses-material-design: true
