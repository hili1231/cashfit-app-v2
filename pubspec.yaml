name: cashfit
description: "Train and get paid."
publish_to: 'none'

version: 1.0.0+1
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # <- your image path
environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  # Cupertino Icons for iOS-like icons
  cupertino_icons: ^1.0.8
  video_player: ^2.9.3
  file_picker: ^10.0.0
  csv: ^6.0.0 
  firebase_core: ^3.12.1
  dio: ^5.0.0
  firebase_auth: ^5.5.1
  pedometer: ^4.1.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.1
  permission_handler: ^12.0.0+1
  sign_in_with_apple: ^7.0.1
  flutter_facebook_auth: ^7.0.0
  cached_network_image: ^3.3.1
  firebase_storage: ^12.4.4
  shared_preferences: ^2.2.3
  firebase_messaging: 15.2.5
  flutter_local_notifications: ^19.0.0
  image_picker: ^1.1.2
  provider: ^6.1.2
  flutter_animate: ^4.5.2
  path_provider: ^2.0.11
  flutter_image_compress: ^2.4.0
  logger: ^2.0.2
  http: ^1.3.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_mobile_ads: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/images/
    - assets/videos/
    - assets/images/fitcoin_icon.png
  uses-material-design: true
